# ─────────────────────────────────────────────────────────────────────────────
# BookRAG — CI Pipeline (Continuous Integration)
#
# Triggers on:
#   - Every push to main
#   - Every pull request targeting main
#
# What it does:
#   Job 1 (test)  : Install deps → run pytest → fail fast if tests break
#   Job 2 (build) : Build Docker image → verify it compiles (don't push)
#
# What it does NOT do:
#   - Push to ACR (that's CD)
#   - Deploy to AKS (that's CD)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR — saves runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Test
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Install uv ────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # ── Step 3: Set up Python ─────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Step 4: Create config.py from example ────────────────────────────
      # config.py is in .gitignore (contains API keys locally).
      # Tests use mocks so empty keys are fine — we just need the file to exist.
      - name: Create config.py from example
        run: cp config/config.example.py config/config.py

      # ── Step 5: Install dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: uv sync --frozen

      # ── Step 6: Run tests ─────────────────────────────────────────────────
      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Docker Build (verify only — no push)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      # ── Step 1: Checkout code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Create config.py from example ────────────────────────────
      - name: Create config.py from example
        run: cp config/config.example.py config/config.py

      # ── Step 3: Set up Docker Buildx ──────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 4: Build the image (don't push) ─────────────────────────────
      # Verifies: Dockerfile syntax, deps install, HuggingFace model downloads
      # cache-from / cache-to: reuse unchanged layers → faster subsequent builds
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: bookrag:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
